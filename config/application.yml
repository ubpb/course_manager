# Shared values get merged with the environment-specific values below
shared:
  color_mode:
    enabled: true

  locale_switching:
    enabled: false

# Values for the development environment
development:
  alma_api:
    api_key: <%= Rails.application.credentials.dig("alma_api", "testing", "api_key") %>

# Values for the production environment
production:
  alma_api:
    api_key: <%= Rails.application.credentials.dig("alma_api", "production", "api_key") %>
