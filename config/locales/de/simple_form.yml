    hints:
      defaults:
        description: >
          Formatierungen mit <a href="https://www.markdownguide.org/basic-syntax" target="_blank">Markdown</a> möglich
        learning_targets: >
          Formatierungen mit <a href="https://www.markdownguide.org/basic-syntax" target="_blank">Markdown</a> möglich
        email_from: >
          Die Adresse wird dem Empfänger als 'Antwort an' angezeigt. Diese muss auf '@ub.uni-paderborn.de' enden.
          Als Standard wird schulungen@ub.uni-paderborn.de verwendet.
        reminder_message: >
          Mailvorlage für den Versand einer Erinnerungsmail an die angemeldeten Teilnehmer der Veranstaltung. Sie können
          <code>###ANREDE###</code>, <code>###DATUM###</code>, <code>###UHRZEIT###</code>, <code>###DAUER###</code>,
          <code>###TREFFPUNKT###</code> und <code>###TITEL###</code> in der Nachricht als Platzhalter verwenden. Die Nachricht wird automatisch
          an die Teilnehmer versendet.
        max_no_of_participants: >
          0 => Keine Beschränkung
        duration: >
          ... in Minuten
        user_notes: >
          Notizen, die für den Nutzer sichtbar sind
        internal_notes: >
          Interne Notizen, die nur für Mitarbeiter sichtbar sind
